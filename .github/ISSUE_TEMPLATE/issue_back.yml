name: "🐛 버그 리포트"
description: "버그를 발견했다면 여기로! 재현 가능한 정보를 남겨주세요."
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  # ── 요약 ──────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 🔍 버그 리포트
        > 이슈를 남겨주셔서 감사합니다!
        > 아래 항목을 최대한 구체적으로 작성해주시면 빠른 해결에 큰 도움이 됩니다.

  # ── 버그 설명 ─────────────────────────────────────────
  - type: textarea
    id: description
    attributes:
      label: "📋 버그 설명"
      description: "어떤 버그인지 간결하고 명확하게 설명해주세요."
      placeholder: "ex) 영상 재생 중 입찰 버튼 클릭 시 플레이어가 멈추면서 입찰이 실패합니다."
    validations:
      required: true

  # ── 재현 순서 ─────────────────────────────────────────
  - type: textarea
    id: steps
    attributes:
      label: "🔁 재현 순서 (Steps to Reproduce)"
      description: "버그를 재현할 수 있는 단계를 순서대로 적어주세요."
      placeholder: |
        1. 큐레이션 피드에서 경매 진행 중인 영상 클릭
        2. 영상 재생 상태에서 '입찰하기' 버튼 클릭
        3. 입찰 금액 입력 후 '확인' 클릭
        4. 영상 플레이어 프리즈 + 입찰 요청 timeout
    validations:
      required: true

  # ── 기대 동작 vs 실제 동작 ─────────────────────────────
  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 동작"
      description: "정상적으로 작동했다면 어떻게 되어야 하나요?"
      placeholder: "ex) 영상 재생이 유지된 채 입찰 완료 토스트가 표시되어야 합니다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ 실제 동작"
      description: "실제로는 어떤 일이 일어났나요?"
      placeholder: "ex) 플레이어가 멈추고 콘솔에 'AbortError: The play() request was interrupted' 에러가 출력됩니다."
    validations:
      required: true

  # ── 스크린샷 / 로그 ───────────────────────────────────
  - type: textarea
    id: evidence
    attributes:
      label: "📸 스크린샷 / 에러 로그"
      description: "관련 스크린샷이나 에러 로그를 첨부해주세요. (선택)"
      placeholder: |
        ```
        여기에 에러 로그를 붙여넣거나, 이미지를 드래그 앤 드롭 해주세요.
        ```
    validations:
      required: false

  # ── 환경 정보 ─────────────────────────────────────────
  - type: dropdown
    id: module
    attributes:
      label: "📦 관련 도메인"
      description: "버그가 발생한 도메인을 선택해주세요."
      options:
        - "🎬 Video Player / Streaming"
        - "🔨 Auction / Bidding"
        - "🎨 Curation / Feed"
        - "👤 Auth / User"
        - "💰 Payment / Settlement"
        - "🛡️ Trust & Safety"
        - "🔔 Notification"
        - "🔧 Infra / Deploy"
        - "기타 (설명에 기재)"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "🔥 심각도"
      description: "버그의 심각도를 선택해주세요."
      options:
        - "🟢 Low — 사소한 UI 깨짐, 오타 등"
        - "🟡 Medium — 기능 일부 오작동, 우회 가능"
        - "🟠 High — 핵심 기능 장애, 우회 어려움"
        - "🔴 Critical — 서비스 중단, 결제·데이터 손실 위험"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "🌐 발생 환경"
      description: "버그가 발생한 환경을 선택해주세요."
      options:
        - Local (localhost)
        - Dev Server
        - Staging
        - Production
      multiple: true
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: "🖥️ 브라우저 / OS / 디바이스"
      description: "사용 중인 환경을 적어주세요. 모바일이면 기종도 함께."
      placeholder: "ex) Chrome 121 / macOS Sonoma | Safari / iPhone 15 Pro"
    validations:
      required: false

  # ── 추가 정보 ─────────────────────────────────────────
  - type: textarea
    id: additional
    attributes:
      label: "💬 추가 정보"
      description: "원인 추정, 관련 PR/커밋, 참고 링크 등 자유롭게 남겨주세요."
      placeholder: "ex) Video.js 이벤트 핸들러와 입찰 모달 간 충돌로 추정됩니다."
    validations:
      required: false

  # ── 확인 체크리스트 ───────────────────────────────────
  - type: checkboxes
    id: checklist
    attributes:
      label: "✔️ 제출 전 체크리스트"
      options:
        - label: "동일한 이슈가 이미 등록되어 있는지 검색했습니다."
          required: true
        - label: "최신 브랜치(develop)에서도 동일하게 재현됩니다."
          required: false
        - label: "관련 에러 로그 또는 스크린샷을 첨부했습니다."
          required: false