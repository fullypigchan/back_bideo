name: "🚀 구현 리스트"
description: "새로운 기능 구현이 필요할 때 여기로! 구현 범위와 요구사항을 정리해주세요."
title: "[Feat]: "
labels: ["enhancement", "feature"]
assignees: []

body:
  # ── 요약 ──────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 🚀 구현 리스트
        > 새로운 기능 또는 개선사항을 제안해주세요.
        > 구현 범위가 명확할수록 작업 분배와 일정 산정이 수월합니다.

  # ── 기능 요약 ─────────────────────────────────────────
  - type: input
    id: summary
    attributes:
      label: "📌 기능 한 줄 요약"
      description: "구현할 기능을 한 줄로 요약해주세요."
      placeholder: "ex) 경매 마감 10분 전 실시간 알림 기능"
    validations:
      required: true

  # ── 상세 설명 ─────────────────────────────────────────
  - type: textarea
    id: description
    attributes:
      label: "📋 상세 설명"
      description: "기능의 배경, 목적, 기대 효과를 설명해주세요."
      placeholder: |
        - 왜 필요한가: 경매 마감 직전 입찰 유도로 거래 활성화
        - 어떤 문제를 해결하는가: 사용자가 마감 시간을 놓쳐 입찰 기회를 잃는 문제
        - 기대 효과: 마감 직전 입찰률 30% 이상 증가 예상
    validations:
      required: true

  # ── 구현 항목 (체크리스트) ──────────────────────────────
  - type: textarea
    id: tasks
    attributes:
      label: "✅ 구현 항목 (Task Breakdown)"
      description: "구현해야 할 세부 작업을 체크리스트로 작성해주세요."
      placeholder: |
        - [ ] DB: notification 테이블 설계
        - [ ] Backend: 경매 마감 스케줄러 구현
        - [ ] Backend: 알림 발송 API 개발
        - [ ] Frontend: 알림 토스트 UI 컴포넌트
        - [ ] Frontend: 알림 목록 페이지
        - [ ] Test: 알림 발송 타이밍 단위 테스트
    validations:
      required: true

  # ── 관련 도메인 ───────────────────────────────────────
  - type: dropdown
    id: module
    attributes:
      label: "📦 관련 도메인"
      description: "이 기능이 속하는 도메인을 선택해주세요."
      multiple: true
      options:
        - "🎬 Video Player / Streaming"
        - "🔨 Auction / Bidding"
        - "🎨 Curation / Feed"
        - "👤 Auth / User"
        - "💰 Payment / Settlement"
        - "🛡️ Trust & Safety"
        - "🔔 Notification"
        - "🔧 Infra / Deploy"
        - "기타 (설명에 기재)"
    validations:
      required: true

  # ── 작업 레이어 ───────────────────────────────────────
  - type: dropdown
    id: layer
    attributes:
      label: "🧱 작업 레이어"
      description: "이 기능이 걸치는 레이어를 모두 선택해주세요."
      multiple: true
      options:
        - "🗄️ DB / Schema"
        - "⚙️ Backend API"
        - "🖥️ Frontend UI"
        - "🎨 Design / UX"
        - "🧪 Test"
        - "📦 DevOps / Infra"
    validations:
      required: true

  # ── 우선순위 ──────────────────────────────────────────
  - type: dropdown
    id: priority
    attributes:
      label: "🎯 우선순위"
      description: "이 기능의 우선순위를 선택해주세요."
      options:
        - "🔵 P0 — Must Have (이번 스프린트 필수)"
        - "🟢 P1 — Should Have (이번 마일스톤 내)"
        - "🟡 P2 — Nice to Have (여유 있을 때)"
        - "⚪ P3 — Backlog (나중에 검토)"
    validations:
      required: true

  # ── 참고 자료 ─────────────────────────────────────────
  - type: textarea
    id: references
    attributes:
      label: "🔗 참고 자료 / 레퍼런스"
      description: "디자인 시안, 기획 문서, 참고 서비스 링크 등을 첨부해주세요."
      placeholder: |
        - Figma: https://figma.com/...
        - 참고 서비스: 번개장터 실시간 알림 UX
        - 관련 이슈: #12, #15
    validations:
      required: false

  # ── 추가 정보 ─────────────────────────────────────────
  - type: textarea
    id: additional
    attributes:
      label: "💬 추가 정보"
      description: "기술적 제약, 의존성, 논의 필요 사항 등 자유롭게 남겨주세요."
      placeholder: "ex) WebSocket 도입 여부에 따라 알림 방식이 달라질 수 있어 논의 필요"
    validations:
      required: false

  # ── 확인 체크리스트 ───────────────────────────────────
  - type: checkboxes
    id: checklist
    attributes:
      label: "✔️ 제출 전 체크리스트"
      options:
        - label: "동일하거나 유사한 이슈가 이미 등록되어 있는지 검색했습니다."
          required: true
        - label: "구현 항목을 세부 태스크 단위로 분리했습니다."
          required: false
        - label: "관련 팀원과 사전 논의를 완료했습니다."
          required: false