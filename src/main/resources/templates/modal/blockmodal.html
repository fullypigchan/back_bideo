<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신고/차단</title>
    <link rel="icon" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/font.css">
    <link rel="stylesheet" href="../../static/css/modal/blockmodal.css">
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">

        <!-- 1단계: 신고/차단/취소 -->
        <div class="modal-sheet" id="actionSheet">
            <button class="danger" id="reportBtn">신고</button>
            <button class="danger" id="blockBtn">차단</button>
            <button class="cancel" id="cancelBtn">취소</button>
        </div>

        <!-- [신고] 2단계: 신고 사유 선택 -->
        <div class="report-reason" id="reportReason">
            <div class="report-reason-header">
                <button class="close-btn" id="reasonCloseBtn">&times;</button>
                <h2>신고하기</h2>
            </div>
            <div class="report-reason-body">
                <p class="subtitle">이 게시물을 신고하는 이유</p>
                <button class="reason-item" data-reason="dislike">
                    <span>민감한 콘텐츠</span>
                    <span class="chevron">&#8250;</span>
                </button>
                <button class="reason-item" data-reason="bullying">
                    <span>사칭</span>
                    <span class="chevron">&#8250;</span>
                </button>
                <button class="reason-item" data-reason="self-harm">
                    <span>괴롭힘 및 혐오 표현</span>
                    <span class="chevron">&#8250;</span>
                </button>
                <button class="reason-item" data-reason="violence">
                    <span>저작권 침해</span>
                    <span class="chevron">&#8250;</span>
                </button>
            </div>
        </div>

        <!-- [신고] 3단계: 신고 완료 -->
        <div class="report-complete" id="reportComplete">
            <div class="report-complete-body">
                <div class="check-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="30" fill="none" stroke="#4BB543" stroke-width="3"/>
                        <path d="M20 33 L28 41 L44 25" fill="none" stroke="#4BB543" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>차단하시겠어요?</h2>
                <p class="description">
                    비데오에서 마음에 들지 않는 콘텐츠를 발견할 경우 해당 콘텐츠가
                    <strong>커뮤니티 규정</strong>을 위반한다면 신고할 수 있으며 공유한 사람을 이용 환경에서 삭제할 수도 있습니다.
                </p>
            </div>
            <div class="report-complete-actions">
                <button class="action-link" id="blockUserBtn">
                    <span id="blockUserName">사용자님 차단</span>
                    <span class="chevron">&#8250;</span>
                </button>
                <button class="action-link" id="communityGuideBtn">
                    <span>커뮤니티 규정에 대해 더 알아보기</span>
                    <span class="chevron">&#8250;</span>
                </button>
            </div>
            <button class="close-complete-btn" id="closeCompleteBtn">닫기</button>
        </div>

        <!-- [차단] 2단계: 차단 확인 -->
        <div class="block-confirm" id="blockConfirm">
            <div class="block-confirm-body">
                <h2 class="block-confirm-title">
                    <span id="blockTargetName">사용자</span>님을 차단하시겠어요?
                </h2>
                <p class="block-confirm-desc">
                    상대방은 BIDEO에서 회원님의 프로필, 게시물 및 스토리를 찾을 수 없게 됩니다.
                    BIDEO는 회원님이 차단한 사실을 상대방에게 알리지 않습니다.
                </p>
            </div>
            <button class="block-confirm-btn danger" id="confirmBlockBtn">차단</button>
            <button class="block-confirm-btn cancel" id="blockCancelBtn">취소</button>
        </div>

        <!-- [차단] 3단계: 차단 완료 알림 -->
        <div class="block-done" id="blockDone">
            <div class="block-done-body">
                <h2 class="block-done-title">
                    <span id="blockDoneName">사용자</span>님을 차단 해제했습니다.
                </h2>
                <p class="block-done-desc">
                    상대방의 프로필에서 언제든지 차단할 수 있습니다.
                </p>
            </div>
            <button class="block-done-btn" id="blockDoneBtn">닫기</button>
        </div>

    </div>
    <script src="../../static/js/modal/blockmodal.js"></script>
</body>
</html>
