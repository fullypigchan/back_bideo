<!-- ========== OWNER-ONLY MODALS ========== -->

<!-- Profile Edit Modal -->
<div class="modal-overlay owner-only" id="editModal" onclick="closeModal('editModal', event)">
  <div class="edit-modal">
    <div class="edit-modal__top">
      <button class="btn-close btn-close--ghost" onclick="closeModal('editModal')">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M15.18 12l7.16-7.16a2.25 2.25 0 10-3.18-3.18L12 8.82 4.84 1.66a2.25 2.25 0 10-3.18 3.18L8.82 12l-7.16 7.16a2.25 2.25 0 103.18 3.18L12 15.18l7.16 7.16a2.25 2.25 0 103.18-3.18z" fill="#111"/>
        </svg>
      </button>
      <h3 class="edit-modal__title">프로필 편집</h3>
      <button class="btn-text" type="button" onclick="saveProfile()">완료</button>
    </div>
    <form class="edit-modal__form" id="editProfileForm" onsubmit="return false;">
      <div class="edit-modal__field">
        <label class="edit-modal__label" for="editUsername">사용자 이름</label>
        <input class="edit-modal__input" type="text" id="editUsername" name="username" placeholder="사용자 이름" maxlength="30">
      </div>
      <div class="edit-modal__field">
        <label class="edit-modal__label" for="editRealname">이름</label>
        <input class="edit-modal__input" type="text" id="editRealname" name="realname" placeholder="이름" maxlength="30">
      </div>
      <div class="edit-modal__field">
        <label class="edit-modal__label" for="editBio">소개</label>
        <textarea class="edit-modal__textarea" id="editBio" name="bio" placeholder="소개를 입력하세요" maxlength="150" rows="3"></textarea>
      </div>
      <div class="edit-modal__field">
        <label class="edit-modal__label">태그</label>
        <div class="edit-modal__tag-input-wrap">
          <div class="edit-modal__tags" id="editTagList"></div>
          <input class="edit-modal__tag-input" type="text" id="editTagInput"
                 placeholder="#태그 입력 후 Enter" maxlength="20">
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Avatar Modal -->
<div class="modal-overlay owner-only" id="avatarModal" onclick="closeModal('avatarModal', event)">
  <div class="avatar-modal">
    <div class="avatar-modal__header">
      <div class="avatar-modal__preview">
        <button class="avatar-modal__preview-btn" title="프로필 사진">
          <img class="avatar-modal__preview-img" alt="프로필 사진" src="">
        </button>
      </div>
      <h3 class="avatar-modal__title">프로필 사진</h3>
      <span class="avatar-modal__subtitle">BIDEO</span>
    </div>
    <div class="avatar-modal__actions">
      <button class="btn-menu-item btn-menu-item--primary" onclick="document.getElementById('avatarFileInput').click()">사진 업로드</button>
      <button class="btn-menu-item btn-menu-item--muted" onclick="closeModal('avatarModal')">취소</button>
      <form style="display:none;">
        <input id="avatarFileInput" accept="image/jpeg,image/png" type="file">
      </form>
    </div>
  </div>
</div>

<!-- Settings Hub Modal -->
<div class="modal-overlay owner-only" id="settingsModal" onclick="closeModal('settingsModal', event)">
  <div class="settings-modal">
    <h3 class="settings-modal__title">프로필 변경</h3>
    <div class="settings-modal__actions">
      <button class="btn-menu-item" onclick="openAvatarFromSettings()">프로필 사진 변경</button>
      <button class="btn-menu-item" onclick="openFollowModal()">팔로우·팔로잉</button>
      <button class="btn-menu-item" onclick="openBadgeModal()">뱃지 관리</button>
      <button class="btn-menu-item" onclick="openPasswordModal()">패스워드 변경</button>
      <button class="btn-menu-item" onclick="">카드 관리</button>
      <button class="btn-menu-item btn-menu-item--muted" onclick="closeModal('settingsModal')">취소</button>
    </div>
  </div>
</div>

<!-- Badge Modal -->
<div class="modal-overlay modal-overlay--upper owner-only" id="badgeModal" onclick="closeModal('badgeModal', event)">
  <div class="badge-modal">
    <div class="badge-modal__top">
      <button class="btn-close btn-close--ghost" onclick="closeModal('badgeModal')">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M15.18 12l7.16-7.16a2.25 2.25 0 10-3.18-3.18L12 8.82 4.84 1.66a2.25 2.25 0 10-3.18 3.18L8.82 12l-7.16 7.16a2.25 2.25 0 103.18 3.18L12 15.18l7.16 7.16a2.25 2.25 0 103.18-3.18z" fill="#111"/>
        </svg>
      </button>
      <h3 class="badge-modal__title">뱃지 관리</h3>
      <button class="btn-text" onclick="saveBadges()">완료</button>
    </div>
    <p class="badge-modal__hint">최대 2개 선택 가능</p>
    <div class="badge-modal__grid" id="badgeGrid"></div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay modal-overlay--upper owner-only" id="passwordModal" onclick="closeModal('passwordModal', event)">
  <div class="password-modal">
    <div class="password-modal__top">
      <button class="btn-close btn-close--ghost" onclick="closeModal('passwordModal')">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M15.18 12l7.16-7.16a2.25 2.25 0 10-3.18-3.18L12 8.82 4.84 1.66a2.25 2.25 0 10-3.18 3.18L8.82 12l-7.16 7.16a2.25 2.25 0 103.18 3.18L12 15.18l7.16 7.16a2.25 2.25 0 103.18-3.18z" fill="#111"/>
        </svg>
      </button>
      <h3 class="password-modal__title">패스워드 변경</h3>
      <button class="btn-text" onclick="savePassword()">완료</button>
    </div>
    <form class="password-modal__form" id="passwordForm" onsubmit="return false;">
      <div class="password-modal__field">
        <label class="password-modal__label" for="currentPassword">현재 비밀번호</label>
        <input class="password-modal__input" type="password" id="currentPassword" placeholder="현재 비밀번호">
      </div>
      <div class="password-modal__field">
        <label class="password-modal__label" for="newPassword">새 비밀번호</label>
        <input class="password-modal__input" type="password" id="newPassword" placeholder="새 비밀번호">
      </div>
      <div class="password-modal__field">
        <label class="password-modal__label" for="confirmPassword">새 비밀번호 확인</label>
        <input class="password-modal__input" type="password" id="confirmPassword" placeholder="새 비밀번호 확인">
      </div>
      <p class="password-modal__error" id="passwordError"></p>
    </form>
  </div>
</div>

<!-- ========== COMMON MODALS ========== -->

<!-- Follow Modal -->
<div class="modal-overlay modal-overlay--upper" id="followModal" onclick="closeModal('followModal', event)">
  <div class="follow-modal">
    <div class="follow-modal__top">
      <button class="btn-close btn-close--ghost" onclick="closeModal('followModal')">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M15.18 12l7.16-7.16a2.25 2.25 0 10-3.18-3.18L12 8.82 4.84 1.66a2.25 2.25 0 10-3.18 3.18L8.82 12l-7.16 7.16a2.25 2.25 0 103.18 3.18L12 15.18l7.16 7.16a2.25 2.25 0 103.18-3.18z" fill="#111"/>
        </svg>
      </button>
      <h3 class="follow-modal__title">팔로워</h3>
      <span></span>
    </div>
    <div class="follow-modal__tabs">
      <button class="follow-modal__tab active" data-follow-tab="followers" onclick="switchFollowTab(this)">팔로워</button>
      <button class="follow-modal__tab" data-follow-tab="following" onclick="switchFollowTab(this)">팔로잉</button>
    </div>
    <div class="follow-modal__search">
      <input class="follow-modal__search-input" type="text" placeholder="검색" oninput="filterFollowList(this.value)">
    </div>
    <div class="follow-modal__list" id="followList"></div>
  </div>
</div>

<script src="../../static/js/profile/profile.js"></script>
