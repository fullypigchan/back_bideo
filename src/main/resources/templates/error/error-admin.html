<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - Error</title>
    <link rel="icon" type="image/png" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-common.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-util.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #FDFDFD;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            max-width: 480px;
            width: 90%;
            padding: 60px 40px;
            background: #FFFFFF;
            border-radius: 40px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease;
        }
        .error-container:hover {
            transform: translateY(-8px);
        }
        .error-icon-box {
            width: 100px;
            height: 100px;
            background: #111;
            color: var(--admin-primary);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.15);
        }
        .error-code {
            font-size: 64px;
            font-weight: 900;
            color: #111;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .error-title {
            font-size: 22px;
            font-weight: 800;
            color: #111;
            margin-bottom: 16px;
        }
        .error-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 32px;
            background: #111;
            color: #FFF;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home:hover {
            background: var(--admin-primary);
            color: #111;
            box-shadow: 0 12px 24px rgba(240, 217, 153, 0.3);
        }
        .btn-back-link {
            display: block;
            margin-top: 24px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .btn-back-link:hover {
            color: #111;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon-box">
            <i data-lucide="alert-triangle" style="width: 48px; height: 48px;"></i>
        </div>
        <div class="error-code">ERROR</div>
        <h1 class="error-title">문제가 발생했습니다.</h1>
        <p class="error-desc">
            요청을 처리하는 과정에서 오류가 발생했습니다.<br>
            잠시 후 다시 시도하시거나 관리자에게 문의해 주세요.
        </p>
        
        <a href="../admin/admin-inquiry-list.html" class="btn-home">
            <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i>
            문의 관리 목록으로 돌아가기
        </a>
        
        <a href="javascript:history.back();" class="btn-back-link">이전 페이지로 이동</a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
