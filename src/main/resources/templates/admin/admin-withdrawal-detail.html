<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - 출금 상세 정보</title>
    <link rel="icon" type="image/png" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-common.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-util.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-modal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="admin-lnb"></div>

    <!-- Common Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-container" style="max-width: 400px;">
            <div class="modal-body text-only">
                <h2 class="modal-title fs-20 fw-800" id="confirm-title">정말 처리하시겠습니까?</h2>
                <p class="modal-desc" id="confirm-message">이 작업은 취소할 수 없습니다.</p>
                <div class="d-flex justify-end gap-12 mt-32">
                    <button class="btn-secondary w-100" onclick="closeConfirmModal()">취소</button>
                    <button class="btn-primary w-100" id="btn-confirm-execute">확인</button>
                </div>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="breadcrumbs">
            <a href="admin-withdrawal-list.html">출금 승인 목록</a>
            <i data-lucide="chevron-right"></i>
            <span class="current">상세 내역</span>
        </div>

        <a href="admin-withdrawal-list.html" class="btn-back">
            <i data-lucide="arrow-left" class="w-16"></i>
            목록으로 돌아가기
        </a>

        <header class="mb-40">
            <div class="d-flex align-center gap-12 mb-8">
                <span class="status-badge">상태 로딩중...</span>
                <span class="text-muted fs-14">요청번호: WDL-772</span>
            </div>
            <h1 class="fs-28 fw-800 text-main">출금 요청 상세</h1>
        </header>

        <div class="detail-grid">
            <div class="content-card">
                <div class="info-section">
                    <h2 class="info-title"><i data-lucide="user" class="w-18"></i>아티스트 정보</h2>
                    <div class="info-row"><div class="info-label">닉네임</div><div class="info-value">Artist_Zio</div></div>
                </div>
                <div class="info-section">
                    <h2 class="info-title"><i data-lucide="landmark" class="w-18"></i>입금 계좌 정보</h2>
                    <div class="info-row"><div class="info-label">은행명</div><div class="info-value">KB국민은행</div></div>
                    <div class="info-row"><div class="info-label">계좌번호</div><div class="info-value fs-18 ls-1">407802-01-123456</div></div>
                </div>
            </div>

            <aside>
                <div class="summary-card">
                    <div class="label">최종 실 수령액</div>
                    <div class="value">₩ 821,950</div>
                </div>
            </aside>
        </div>
    </main>

    <script src="../../static/js/admin/admin-service.js"></script>
    <script src="../../static/js/admin/admin-layout.js"></script>
    <script src="../../static/js/admin/admin-event.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
