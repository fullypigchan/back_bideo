<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - 결제 내역 목록</title>
    <link rel="icon" type="image/png" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-common.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-util.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-modal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="admin-lnb"></div>

    <main class="main-content">
        <!-- 현재 위치 -->
        <div class="breadcrumbs">
            <span class="current">결제 내역 목록</span>
        </div>

        <!-- 타이틀, 서브 타이틀 -->
        <header class="mb-32">
            <h1 class="fs-24 fw-800 text-main">결제 내역 목록</h1>
            <p class="text-sub fs-14">BIDEO 서비스 내에서 발생한 모든 결제 트랜잭션을 관리합니다.</p>
        </header>

        <!-- 컨텐츠 -->
        <section class="content-card">

            <!-- 컨텐츠 안 네비게이션 -->
            <div class="list-controls">
                <div class="search-wrapper">
                    <label for="payment-search"><i data-lucide="search"></i></label>
                    <input type="text" id="payment-search" class="search-input" placeholder="주문번호 또는 구매자명 검색...">
                </div>
                <div class="filter-group">
                    <button class="btn-filter active">전체</button>
                    <button class="btn-filter">결제완료</button>
                    <button class="btn-filter">결제취소</button>
                </div>
            </div>

            <!-- 리스트 -->
            <table class="bideo-table">
                <thead>
                    <tr>
                        <th class="text-center col-id" style="width: 200px;">주문번호</th>
                        <th class="text-center">결제자</th>
                        <th class="text-center col-status">경매/거래</th>
                        <th class="col-flexible">작품명</th>
                        <th class="text-center">금액</th>
                        <th class="text-center col-status">결제상태</th>
                        <th class="text-center col-action">상세</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-center col-id">ORD-20240309-001</td>
                        <td class="text-center">홍길동</td>
                        <td class="text-center col-status">경매</td>
                        <td class="fw-700 col-flexible">
                            <div class="text-truncate-2">Deep Blue Midnight</div>
                        </td>
                        <td class="text-center">₩ 1,250,000</td>
                        <td class="text-center col-status"><span class="status-badge status-active">결제완료</span></td>
                        <td class="text-center col-action">
                            <button class="action-btn" onclick="location.href='admin-payment-detail.html?status=completed'"><i data-lucide="chevron-right"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-center col-id">ORD-20240308-042</td>
                        <td class="text-center">김철수</td>
                        <td class="text-center col-status">경매</td>
                        <td class="fw-700 col-flexible">
                            <div class="text-truncate-2">Golden Era #03</div>
                        </td>
                        <td class="text-center">₩ 4,800,000</td>
                        <td class="text-center col-status"><span class="status-badge status-urgent">결제취소</span></td>
                        <td class="text-center col-action">
                            <button class="action-btn" onclick="location.href='admin-payment-detail.html?status=cancelled'"><i data-lucide="chevron-right"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-center col-id">ORD-20240307-015</td>
                        <td class="text-center">이영희</td>
                        <td class="text-center col-status">거래</td>
                        <td class="fw-700 col-flexible">
                            <div class="text-truncate-2">Silent Forest</div>
                        </td>
                        <td class="text-center">₩ 950,000</td>
                        <td class="text-center col-status"><span class="status-badge status-pending">결제대기</span></td>
                        <td class="text-center col-action">
                            <button class="action-btn" onclick="location.href='admin-payment-detail.html?status=pending'"><i data-lucide="chevron-right"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- 취소 모달 -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-container" style="max-width: 400px;">
            <div class="modal-body text-only">
                <h2 class="modal-title fs-20 fw-800" id="confirm-title">정말 처리하시겠습니까?</h2>
                <p class="modal-desc" id="confirm-message">이 작업은 취소할 수 없습니다.</p>
                <div class="d-flex justify-end gap-12 mt-32">
                    <button class="btn-secondary w-100" onclick="closeConfirmModal()">취소</button>
                    <button class="btn-primary w-100" id="btn-confirm-execute">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <script src="../../static/js/admin/admin-service.js"></script>
    <script src="../../static/js/admin/admin-layout.js"></script>
    <script src="../../static/js/admin/admin-event.js"></script>
</body>
</html>
