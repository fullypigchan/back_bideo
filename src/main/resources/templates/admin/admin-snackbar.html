<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - Snackbar Guide</title>
    <link rel="icon" type="image/png" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-common.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-snackbar.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #f4f4f4; padding: 40px;">
    
    <div class="content-card" style="max-width: 800px; margin: 0 auto;">
        <header class="mb-32">
            <h1 class="fs-24 fw-800 text-main">Admin Snackbar Guide</h1>
            <p class="text-sub fs-14">관리자 페이지에서 사용하는 통합 알림(Snackbar) 가이드입니다.</p>
        </header>

        <section class="mb-40">
            <h2 class="fs-18 fw-700 mb-16">1. 기본 알림 (Basic)</h2>
            <div class="d-flex gap-12 flex-wrap">
                <button class="btn-primary" onclick="BIDEO_LAYOUT.showSnackbar('작업이 성공적으로 완료되었습니다.', 'success')">Success</button>
                <button class="btn-secondary text-error" onclick="BIDEO_LAYOUT.showSnackbar('처리 중 오류가 발생했습니다.', 'error')">Error</button>
                <button class="btn-secondary text-main" onclick="BIDEO_LAYOUT.showSnackbar('새로운 알림이 있습니다.', 'info')">Info</button>
                <button class="btn-secondary" style="color: #FFC107;" onclick="BIDEO_LAYOUT.showSnackbar('주의가 필요한 작업입니다.', 'warning')">Warning</button>
            </div>
        </section>

        <section class="mb-40">
            <h2 class="fs-18 fw-700 mb-16">2. 상황별 예시 (Scenarios)</h2>
            <div class="d-grid gap-12" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                <button class="btn-secondary" onclick="BIDEO_LAYOUT.showSnackbar('전시 상태가 변경되었습니다.', 'success')">전시 상태 변경</button>
                <button class="btn-secondary" onclick="BIDEO_LAYOUT.showSnackbar('회원 정보가 수정되었습니다.', 'success')">회원 정보 수정</button>
                <button class="btn-secondary" onclick="BIDEO_LAYOUT.showSnackbar('경매가 강제 종료되었습니다.', 'warning')">경매 종료</button>
                <button class="btn-secondary" onclick="BIDEO_LAYOUT.showSnackbar('이미지를 업로드했습니다.', 'success')">이미지 업로드</button>
                <button class="btn-secondary" onclick="BIDEO_LAYOUT.showSnackbar('삭제된 데이터는 복구할 수 없습니다.', 'error')">삭제 경고</button>
            </div>
        </section>
    </div>

    <!-- 스크립트 로드 -->
    <script src="../../static/js/admin/admin-layout.js"></script>
    <script>
        // 데모용 강제 로드 (실제 환경에서는 admin-layout.js가 자동 처리)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
