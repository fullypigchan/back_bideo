<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - 노출 제어 목록</title>
    <link rel="icon" type="image/png" href="../../static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="../../static/css/common/global.css">
    <link rel="stylesheet" href="../../static/css/common/font.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-common.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-util.css">
    <link rel="stylesheet" href="../../static/css/admin/admin-modal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="admin-lnb"></div>

    <main class="main-content">
        <!-- 현재 위치 -->
        <div class="breadcrumbs">
            <span class="current">노출 제어 목록</span>
        </div>

        <!-- 타이틀, 서브 타이틀 -->
        <header class="mb-32">
            <h1 class="fs-24 fw-800 text-main">노출 제어 목록</h1>
            <p class="text-sub fs-14">메인 페이지 및 검색 결과의 노출 우선순위와 상태를 관리합니다.</p>
        </header>

        <!-- 컨텐츠 -->
        <section class="content-card">

            <!-- 컨텐츠 안 네비게이션 -->
            <div class="list-controls">
                <div class="search-wrapper">
                    <label for="display-search"><i data-lucide="search"></i></label>
                    <input type="text" id="display-search" class="search-input" placeholder="작품명 검색...">
                </div>
            </div>

            <!-- 리스트 -->
            <table class="bideo-table">
                <thead>
                    <tr>
                        <th class="col-flexible">콘텐츠명</th>
                        <th class="text-center">노출 위치</th>
                        <th class="text-center col-short">우선순위</th>
                        <th class="text-center col-status">노출 여부</th>
                        <th class="text-center col-action">상세</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="fw-700 col-flexible">
                            <div class="text-truncate-2">The Eternal Echo</div>
                        </td>
                        <td class="text-center">메인 하이라이트</td>
                        <td class="text-center col-short">1</td>
                        <td class="text-center col-status"><span class="status-badge status-active">노출중</span></td>
                        <td class="text-center col-action">
                            <button class="action-btn" onclick="location.href='admin-display-detail.html?status=on'"><i data-lucide="chevron-right"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td class="fw-700 col-flexible">
                            <div class="text-truncate-2">Midnight Serenade</div>
                        </td>
                        <td class="text-center">검색 결과 상단</td>
                        <td class="text-center col-short">5</td>
                        <td class="text-center col-status"><span class="status-badge status-urgent">중단</span></td>
                        <td class="text-center col-action">
                            <button class="action-btn" onclick="location.href='admin-display-detail.html?status=off'"><i data-lucide="chevron-right"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- 공통 모달 -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-container" style="max-width: 400px;">
            <div class="modal-body text-only">
                <h2 class="modal-title fs-20 fw-800" id="confirm-title">정말 처리하시겠습니까?</h2>
                <p class="modal-desc" id="confirm-message">이 작업은 취소할 수 없습니다.</p>
                <div class="d-flex justify-end gap-12 mt-32">
                    <button class="btn-secondary w-100" onclick="closeConfirmModal()">취소</button>
                    <button class="btn-primary w-100" id="btn-confirm-execute">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <script src="../../static/js/admin/admin-service.js"></script>
    <script src="../../static/js/admin/admin-layout.js"></script>
    <script src="../../static/js/admin/admin-event.js"></script>
</body>
</html>
